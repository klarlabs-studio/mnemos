version: 2

project_name: mnemos

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mnemos
    main: ./cmd/mnemos
    binary: mnemos
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }} -X main.buildDate={{ .Date }}

archives:
  - id: bundles
    ids:
      - mnemos
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*

brews:
  - ids:
      - bundles
    repository:
      owner: klarlabs-studio
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/klarlabs-studio/mnemos
    description: "Local-first evidence layer that grounds AI in truth"
    license: MIT
    install: |
      bin.install "mnemos"
    test: |
      system bin/"mnemos", "--version"

dockers:
  - image_templates:
      - "ghcr.io/klarlabs-studio/mnemos:{{ .Version }}-amd64"
      - "ghcr.io/klarlabs-studio/mnemos:latest-amd64"
    use: buildx
    ids:
      - mnemos
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - image_templates:
      - "ghcr.io/klarlabs-studio/mnemos:{{ .Version }}-arm64"
      - "ghcr.io/klarlabs-studio/mnemos:latest-arm64"
    use: buildx
    ids:
      - mnemos
    dockerfile: Dockerfile
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/klarlabs-studio/mnemos:{{ .Version }}"
    image_templates:
      - "ghcr.io/klarlabs-studio/mnemos:{{ .Version }}-amd64"
      - "ghcr.io/klarlabs-studio/mnemos:{{ .Version }}-arm64"
  - name_template: "ghcr.io/klarlabs-studio/mnemos:latest"
    image_templates:
      - "ghcr.io/klarlabs-studio/mnemos:latest-amd64"
      - "ghcr.io/klarlabs-studio/mnemos:latest-arm64"

# SBOM (CycloneDX + SPDX) is generated by nox in the release workflow
# before goreleaser runs and attached via `release.extra_files` below.
# Nox is already on the project's toolchain (security workflow uses it
# for scanning + suppressed-finding gating), so we reuse it instead of
# pulling syft as a second SBOM tool.

# Cosign keyless signing for archives + Docker manifests. Identity is
# the GitHub Actions OIDC token; signature transparency is uploaded
# to the Rekor public log. Verification:
#   cosign verify-blob --certificate-identity-regexp ...
signs:
  - id: archives
    cmd: cosign
    artifacts: archive
    output: true
    args:
      - "sign-blob"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

docker_signs:
  - id: docker-images
    cmd: cosign
    artifacts: manifests
    output: true
    args:
      - "sign"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--yes"
      - "${artifact}@${digest}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: klarlabs-studio
    name: Mnemos
  draft: false
  prerelease: auto
  extra_files:
    # Nox-generated SBOMs (CycloneDX + SPDX) emitted into ./sbom-out/
    # by the release workflow before goreleaser runs.
    - glob: ./sbom-out/sbom.cdx.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_sbom.cdx.json"
    - glob: ./sbom-out/sbom.spdx.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_sbom.spdx.json"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
