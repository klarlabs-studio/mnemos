version: 2

project_name: mnemos

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mnemos
    main: ./cmd/mnemos
    binary: mnemos
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }} -X main.buildDate={{ .Date }}

archives:
  - id: bundles
    ids:
      - mnemos
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*

# homebrew_casks replaces brews (deprecated in GoReleaser v2.16). Homebrew's
# own guidance is that a cask, not a formula, is the right vehicle for a
# pre-compiled binary — the old path generated a formula that only pretended to
# build from source.
#
# Existing `brew install klarlabs-studio/tap/mnemos` users are migrated
# automatically by tap_migrations.json in the tap repo; without that file they
# would keep the orphaned formula and silently stop receiving updates.
homebrew_casks:
  - ids:
      - bundles
    repository:
      owner: klarlabs-studio
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/klarlabs-studio/mnemos
    description: "Local-first evidence layer that grounds AI in truth"
    license: MIT
    binaries:
      - mnemos
    hooks:
      post:
        # The release archives are not notarized, so Gatekeeper quarantines the
        # binary on first run. A formula was never subject to this; a cask is.
        install: |
          if OS.mac?
            system_command "xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mnemos"]
          end

# dockers_v2 replaces the old dockers + docker_manifests pair (deprecated in
# GoReleaser v2.16). One buildx invocation builds and pushes every platform and
# writes the manifest itself, so the per-arch image stanzas and the manifest
# stanzas that stitched them together are both gone.
#
# Because buildx now supplies a per-platform build context, the Dockerfile
# copies from $TARGETPLATFORM/ rather than the flat context root.
dockers_v2:
  - images:
      - "ghcr.io/klarlabs-studio/mnemos"
    tags:
      - "{{ .Version }}"
      - "latest"
    ids:
      - mnemos
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.licenses: "MIT"

# SBOM (CycloneDX + SPDX) is generated by nox in the release workflow
# before goreleaser runs and attached via `release.extra_files` below.
# Nox is already on the project's toolchain (security workflow uses it
# for scanning + suppressed-finding gating), so we reuse it instead of
# pulling syft as a second SBOM tool.

# Cosign keyless signing for archives + Docker manifests. Identity is
# the GitHub Actions OIDC token; signature transparency is uploaded
# to the Rekor public log. Verification:
#   cosign verify-blob --certificate-identity-regexp ...
signs:
  - id: archives
    cmd: cosign
    artifacts: archive
    output: true
    args:
      - "sign-blob"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

docker_signs:
  - id: docker-images
    cmd: cosign
    output: true
    args:
      - "sign"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--yes"
      - "${artifact}@${digest}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: klarlabs-studio
    name: Mnemos
  draft: false
  prerelease: auto
  extra_files:
    # Nox-generated SBOMs (CycloneDX + SPDX) emitted into ./sbom-out/
    # by the release workflow before goreleaser runs.
    - glob: ./sbom-out/sbom.cdx.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_sbom.cdx.json"
    - glob: ./sbom-out/sbom.spdx.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_sbom.spdx.json"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
