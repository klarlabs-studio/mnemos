name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - name: Build site
        run: mkdocs build --strict --site-dir _site
        working-directory: docs-site
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site/_site
  # Deploy step is intentionally separate. To publish to a docs subdomain
  # (e.g. docs.mnemos.dev), wire `peaceiris/actions-gh-pages@v3` here
  # against a dedicated branch — the existing klarlabs-studio.github.io/mnemos
  # path keeps the marketing landing page (docs/index.html), which lives
  # in main:/docs and is unrelated to this build.
