openapi: 3.0.3
info:
  title: Mnemos HTTP Registry
  description: |
    Mnemos is the local-first evidence layer that grounds AI in truth. This
    schema covers the HTTP registry surface exposed by `mnemos serve`. The
    equivalent gRPC service is at `proto/mnemos/v1/mnemos.proto` and covers
    the same Phase 2-7 entity surface.
  version: 0.13.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:7777
    description: Default `mnemos serve` bind
security:
  - bearerAuth: []
  - {}
paths:
  /health:
    get:
      summary: Liveness probe
      description: Open path; bypasses bearer auth.
      security: []
      responses:
        "200":
          description: Server reachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
  /v1/metrics:
    get:
      summary: Knowledge-base counts
      description: |
        Mirrors `mnemos metrics`: total events, claims by type and status,
        contradictions, average trust score, low-trust count.
      responses:
        "200":
          description: Counts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Metrics" }
  /v1/process:
    post:
      summary: Run the ingest→extract→relate pipeline on raw text
      description: |
        Server-side analogue of the MCP `process_text` tool: ingests raw text,
        extracts claims, detects relationships, and persists the artifacts.
        Requires the `claims:write` scope. `use_llm`/`use_embeddings` are
        tri-state — omit them to let the server decide (LLM extraction iff a
        provider is configured), or set them explicitly to force. This is the
        endpoint a hosted-brain `capture` hook POSTs a session transcript to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string, description: "Raw text to ingest and process." }
                use_llm: { type: boolean, description: "Force LLM extraction on/off. Omit to use the server default." }
                use_embeddings: { type: boolean, description: "Force embedding generation on/off. Omit to follow use_llm." }
      responses:
        "200":
          description: Pipeline summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string }
                  events: { type: integer }
                  claims: { type: integer }
                  relationships: { type: integer }
                  embeddings: { type: integer }
                  used_llm: { type: boolean }
                  used_embeddings: { type: boolean }
        "400": { description: "Missing or empty text" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/events:
    get:
      summary: List events
      parameters:
        - { name: run_id, in: query, schema: { type: string }, description: "When set, restricts results to events for this run only. Used by external-agent auditors to replay one run's full chain." }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/Event" }
    post:
      summary: Append a batch of events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items: { $ref: "#/components/schemas/Event" }
      responses:
        "200":
          description: Append summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppendSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/claims:
    get:
      summary: List claims
      description: |
        Bi-temporal: claims have a validity-time axis (`as_of`) and an
        ingestion-time axis (`recorded_as_of`). Both filters are
        independent; a claim that was valid yesterday but recorded
        today returns under `as_of=yesterday` AND `recorded_as_of=now`,
        and disappears under `as_of=yesterday` AND `recorded_as_of=yesterday`.
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [fact, hypothesis, decision] } }
        - { name: status, in: query, schema: { type: string, enum: [active, contested, resolved, deprecated] } }
        - { name: as_of, in: query, schema: { type: string, format: date-time }, description: "Validity time. Returns claims that were in force at this instant." }
        - { name: recorded_as_of, in: query, schema: { type: string, format: date-time }, description: "Ingestion time. Drops claims with created_at after this instant — the response reproduces what the store knew then." }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        "200":
          description: Claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  claims:
                    type: array
                    items: { $ref: "#/components/schemas/Claim" }
    post:
      summary: Upsert a batch of claims
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claims]
              properties:
                claims:
                  type: array
                  items: { $ref: "#/components/schemas/Claim" }
      responses:
        "200":
          description: Upsert summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppendSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/relationships:
    get:
      summary: List relationships
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [supports, contradicts, causes, caused_by, action_of, outcome_of, validates, refutes, derived_from] } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        "200":
          description: Relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  relationships:
                    type: array
                    items: { $ref: "#/components/schemas/Relationship" }
    post:
      summary: Upsert relationships
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [relationships]
              properties:
                relationships:
                  type: array
                  items: { $ref: "#/components/schemas/Relationship" }
      responses:
        "200":
          description: Upsert summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppendSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/context:
    get:
      summary: Get a Context Block for a run
      description: |
        Returns a stable, agent-ready string summarising the memory
        state for one run — top claims by trust, surfaced
        contradictions, and a footer with counts. Designed to be
        dropped directly into a system prompt.
      parameters:
        - { name: run_id, in: query, required: true, schema: { type: string } }
        - { name: query, in: query, schema: { type: string }, description: "Optional refinement (currently unused; reserved for hybrid retrieval)." }
        - { name: max_tokens, in: query, schema: { type: integer, minimum: 0 }, description: "Truncate output to keep within an approximate token budget (chars/4)." }
      responses:
        "200":
          description: Context block
          content:
            application/json:
              schema:
                type: object
                required: [run_id, context]
                properties:
                  run_id: { type: string }
                  context: { type: string }
        "400":
          description: Missing run_id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      summary: Get a Context Block (JSON body variant)
      description: |
        Same as GET but accepts a JSON body. Useful when callers want
        to set max_tokens without URL encoding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [run_id]
              properties:
                run_id: { type: string }
                query: { type: string }
                max_tokens: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Context block
          content:
            application/json:
              schema:
                type: object
                required: [run_id, context]
                properties:
                  run_id: { type: string }
                  context: { type: string }
        "400":
          description: Missing or invalid input
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /v1/search:
    get:
      summary: Hybrid retrieval over the claim store
      description: |
        Combines BM25 + cosine similarity (when embeddings are
        configured) + relationship-graph hop expansion to rank
        claims for the query. Filter DSL covers run_id, type,
        status, scope, point-in-time, and trust threshold.
      parameters:
        - { name: query, in: query, required: true, schema: { type: string } }
        - { name: run_id, in: query, schema: { type: string } }
        - { name: top_k, in: query, schema: { type: integer, minimum: 1, maximum: 200 } }
        - { name: min_trust, in: query, schema: { type: number, format: double, minimum: 0, maximum: 1 } }
        - { name: as_of, in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Search hits
          content:
            application/json:
              schema:
                type: object
                properties:
                  query: { type: string }
                  top_k: { type: integer }
                  total: { type: integer }
                  applied_filters:
                    type: object
                    additionalProperties: true
                  claims:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        text: { type: string }
                        type: { type: string }
                        status: { type: string }
                        confidence: { type: number, format: double }
                        trust_score: { type: number, format: double }
                  contradictions:
                    type: array
                    items: { $ref: "#/components/schemas/Relationship" }
        "400":
          description: Missing query or invalid filter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      summary: Hybrid retrieval (JSON body variant)
      description: |
        Same as GET but accepts a richer JSON body — additional
        filters (claim type/status, scope.service/env/team) ride
        in `filters` and `scope` instead of being URL-encoded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
                run_id: { type: string }
                top_k: { type: integer, minimum: 1, maximum: 200 }
                min_trust: { type: number, format: double, minimum: 0, maximum: 1 }
                as_of: { type: string, format: date-time }
                scope:
                  type: object
                  properties:
                    service: { type: string }
                    env: { type: string }
                    team: { type: string }
                filters:
                  type: object
                  properties:
                    type: { type: string, enum: [fact, hypothesis, decision] }
                    status: { type: string, enum: [active, contested, resolved, deprecated] }
      responses:
        "200":
          description: Search hits
          content:
            application/json:
              schema:
                type: object
                properties:
                  query: { type: string }
                  top_k: { type: integer }
                  total: { type: integer }
                  applied_filters: { type: object }
                  claims: { type: array, items: { type: object } }
                  contradictions: { type: array, items: { $ref: "#/components/schemas/Relationship" } }
        "400":
          description: Missing query or invalid filter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /v1/embeddings:
    get:
      summary: List embeddings
      parameters:
        - { name: entity_type, in: query, schema: { type: string, enum: [event, claim] } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        "200":
          description: Embeddings
          content:
            application/json:
              schema:
                type: object
                properties:
                  embeddings:
                    type: array
                    items: { $ref: "#/components/schemas/Embedding" }
    post:
      summary: Upsert embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [embeddings]
              properties:
                embeddings:
                  type: array
                  items: { $ref: "#/components/schemas/Embedding" }
      responses:
        "200":
          description: Upsert summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppendSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/who-knows:
    get:
      summary: Rank the workers most expert on a query
      description: |
        Connected-brain read: for a topic query, returns the workers ranked
        by their affinity for it, along with a reliability signal and how
        many claims back the expertise. Reads stay open (no token).
      tags: [cognitive]
      parameters:
        - { name: query, in: query, required: true, schema: { type: string }, description: "Topic to rank experts for." }
        - { name: limit, in: query, schema: { type: integer, minimum: 1 }, description: "Max experts to return (default 10)." }
      responses:
        "200":
          description: Ranked experts
          content:
            application/json:
              schema:
                type: object
                required: [query, experts]
                properties:
                  query: { type: string }
                  experts:
                    type: array
                    items: { $ref: "#/components/schemas/Expert" }
        "400":
          description: Missing query
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /v1/knowledge-gaps:
    get:
      summary: Surface the store's knowledge gaps
      description: |
        Connected-brain read: claims that are isolated, contested, or
        otherwise flagged as gaps in the knowledge graph, scored by
        severity. Reads stay open (no token).
      tags: [cognitive]
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1 }, description: "Max gaps to return (default 20)." }
      responses:
        "200":
          description: Knowledge gaps
          content:
            application/json:
              schema:
                type: object
                properties:
                  gaps:
                    type: array
                    items: { $ref: "#/components/schemas/KnowledgeGap" }
  /v1/calibration:
    get:
      summary: Confidence-calibration report
      description: |
        How well stated confidence matches observed accuracy — an overall
        ECE + Brier score, per-confidence-bucket breakdown, and per-source
        calibration. Reads stay open (no token).
      tags: [cognitive]
      responses:
        "200":
          description: Calibration report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Calibration" }
  /v1/hypercorrections:
    get:
      summary: List detected hypercorrections
      description: |
        Cases where a lower-trust challenging claim overturned a previously
        promoted, higher-trust claim — the store's "I was wrong about X"
        record. Reads stay open (no token).
      tags: [cognitive]
      responses:
        "200":
          description: Hypercorrections
          content:
            application/json:
              schema:
                type: object
                properties:
                  hypercorrections:
                    type: array
                    items: { $ref: "#/components/schemas/Hypercorrection" }
  /v1/recombinations:
    get:
      summary: Suggest analogical claim recombinations
      description: |
        Pairs of claims that are structurally similar but not yet linked —
        candidate analogies for creative recombination, scored by
        similarity. Reads stay open (no token).
      tags: [cognitive]
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1 }, description: "Max pairs to return (default 20)." }
      responses:
        "200":
          description: Recombinations
          content:
            application/json:
              schema:
                type: object
                properties:
                  recombinations:
                    type: array
                    items: { $ref: "#/components/schemas/Recombination" }
  /v1/classify:
    get:
      summary: Classify a candidate statement against the store
      description: |
        Novelty check: given free text, reports whether it is novel,
        redundant, or a variant of an existing claim, with the matched
        anchor claim and a confidence. A read (no side effects) → GET,
        so it needs no token.
      tags: [cognitive]
      parameters:
        - { name: text, in: query, required: true, schema: { type: string }, description: "Candidate statement to classify." }
      responses:
        "200":
          description: Assimilation verdict
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assimilation" }
        "400":
          description: Missing text
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /v1/decisions:
    get:
      summary: List decisions
      description: |
        The decision browse surface: recorded decisions with their plan,
        reasoning, risk level, considered alternatives, and (once observed)
        the linked outcome. Reads stay open (no token).
      tags: [cognitive]
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1 }, description: "Max decisions to return (default 50)." }
      responses:
        "200":
          description: Decisions
          content:
            application/json:
              schema:
                type: object
                properties:
                  decisions:
                    type: array
                    items: { $ref: "#/components/schemas/Decision" }
  /v1/decisions/{id}:
    get:
      summary: Get one decision
      tags: [cognitive]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Decision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Decision" }
        "404":
          description: Decision not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /v1/recall:
    get:
      summary: Epistemic-honesty recall variants
      description: |
        Advanced recall over the claim store. Unlike `/v1/search`, recall
        also reports whether the retrieved set is SUFFICIENT, can spend a
        stakes-scaled effort budget, bias by a context string, surface
        CONFLICTS, or iterate retrieve↔reason rounds. The `mode` query param
        selects the variant; the response carries only the fields relevant to
        that mode. A read (no side effects) → GET, so it needs no token.
      tags: [cognitive]
      parameters:
        - { name: query, in: query, required: true, schema: { type: string }, description: "Retrieval query text." }
        - { name: mode, in: query, schema: { type: string, enum: [sufficiency, effort, context, conflicts, iterative], default: sufficiency }, description: "Recall variant. Governs which optional response fields are populated." }
        - { name: limit, in: query, schema: { type: integer, minimum: 1 }, description: "Max results." }
        - { name: hops, in: query, schema: { type: integer, minimum: 1 }, description: "Relationship-graph hop expansion depth." }
        - { name: run_id, in: query, schema: { type: string }, description: "Restrict recall to one run." }
        - { name: stakes, in: query, schema: { type: number, format: double, minimum: 0, maximum: 1 }, description: "mode=effort only — stakes level that scales the effort budget (default 0.5)." }
        - { name: context, in: query, schema: { type: string }, description: "mode=context only — a context string that biases ranking." }
        - { name: max_rounds, in: query, schema: { type: integer, minimum: 1 }, description: "mode=iterative only — max retrieve↔reason rounds (default 3)." }
      responses:
        "200":
          description: Recall results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecallResponse" }
        "400":
          description: Missing query or invalid mode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /v1/blocks:
    get:
      summary: List a worker's working-memory blocks
      description: |
        The bounded, worker-scoped working-memory blocks injected verbatim
        ahead of retrieval hints. Reads stay open (no token).
      tags: [cognitive]
      parameters:
        - { name: owner, in: query, required: true, schema: { type: string }, description: "Block owner (worker id)." }
      responses:
        "200":
          description: Working-memory blocks
          content:
            application/json:
              schema:
                type: object
                required: [owner, blocks]
                properties:
                  owner: { type: string }
                  blocks:
                    type: array
                    items: { $ref: "#/components/schemas/WorkingMemoryBlock" }
        "400":
          description: Missing owner
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      summary: Set or append a working-memory block
      description: |
        Sets a block's value, or appends to it when `append` is true.
        A write → requires a bearer token.
      tags: [cognitive]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner, label]
              properties:
                owner: { type: string }
                label: { type: string }
                value: { type: string }
                append: { type: boolean, description: "Append to the block instead of replacing it." }
      responses:
        "200":
          description: Block written
          content:
            application/json:
              schema:
                type: object
                properties:
                  owner: { type: string }
                  label: { type: string }
        "400":
          description: Missing owner/label or invalid body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/actions:
    post:
      summary: Record an action (skill loop)
      description: |
        Records an action taken by a worker; the nightly consolidate pass
        synthesizes recorded actions + their outcomes into lessons and
        playbooks. A write → requires a bearer token.
      tags: [cognitive]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind]
              properties:
                id: { type: string, description: "Optional client-supplied id; server generates one when omitted." }
                kind: { type: string, description: "Action kind (e.g. open_pr, post_finding, investigate)." }
                subject: { type: string }
                actor: { type: string, description: "Worker id that performed the action." }
                metadata:
                  type: object
                  additionalProperties: { type: string }
      responses:
        "201":
          description: Action recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
        "400":
          description: Missing kind or invalid body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/actions/{id}/outcome:
    post:
      summary: Record an action's outcome (skill loop)
      description: |
        Attaches the observed result of a previously recorded action.
        A write → requires a bearer token.
      tags: [cognitive]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, description: "The action id to attach an outcome to." }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                result: { type: string, description: "Outcome result (e.g. success, failure)." }
                metrics:
                  type: object
                  additionalProperties: { type: number, format: double }
                notes: { type: string }
      responses:
        "200":
          description: Outcome recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  action_id: { type: string }
                  result: { type: string }
        "400":
          description: Invalid body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/synthesize:
    post:
      summary: Run a synthesis pass (skill loop)
      description: |
        Synthesizes recorded actions + outcomes into lessons and playbooks,
        returning how many of each were derived. A write → requires a bearer
        token.
      tags: [cognitive]
      responses:
        "200":
          description: Synthesis summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  lessons_derived: { type: integer }
                  playbooks_derived: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/timeline:
    get:
      summary: Temporal event timeline
      description: |
        Events on the temporal axis, optionally filtered by run, time
        window, and event types. Reads stay open (no token).
      tags: [cognitive]
      parameters:
        - { name: run_id, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time }, description: "Lower time bound (inclusive)." }
        - { name: to, in: query, schema: { type: string, format: date-time }, description: "Upper time bound (inclusive)." }
        - { name: types, in: query, schema: { type: string }, description: "Comma-separated list of event types to include." }
        - { name: limit, in: query, schema: { type: integer, minimum: 1 }, description: "Max events (default 50)." }
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/TimelineEvent" }
  /v1/signals:
    get:
      summary: Temporal signals
      description: |
        Detected temporal patterns (recurrence, drift, bursts) with a
        strength/confidence and detection window. Reads stay open (no token).
      tags: [cognitive]
      parameters:
        - { name: run_id, in: query, schema: { type: string } }
        - { name: min_confidence, in: query, schema: { type: number, format: double, minimum: 0, maximum: 1 }, description: "Drop signals below this confidence." }
        - { name: limit, in: query, schema: { type: integer, minimum: 1 }, description: "Max signals (default 50)." }
      responses:
        "200":
          description: Signals
          content:
            application/json:
              schema:
                type: object
                properties:
                  signals:
                    type: array
                    items: { $ref: "#/components/schemas/Signal" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT (HS256) issued by the same `mnemos serve` instance via
        `mnemos token issue`. Required on all write methods (POST/PUT/DELETE);
        reads stay open. Signing key from `MNEMOS_JWT_SECRET` or
        `MNEMOS_AUTH_DIR/jwt-secret`. The same verifier gates the gRPC surface.
        Client-side `MNEMOS_REGISTRY_TOKEN` is for push/pull against a *remote*
        registry and is unrelated to inbound auth.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Health:
      type: object
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string }
      required: [status]
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]
    Event:
      type: object
      properties:
        id: { type: string }
        run_id: { type: string }
        schema_version: { type: string }
        content: { type: string }
        source_input_id: { type: string }
        timestamp: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true
      required: [id, content, timestamp]
    Claim:
      type: object
      properties:
        id: { type: string }
        text: { type: string }
        type: { type: string, enum: [fact, hypothesis, decision] }
        status: { type: string, enum: [active, contested, resolved, deprecated] }
        confidence: { type: number, format: double }
        trust_score: { type: number, format: double }
        valid_from: { type: string, format: date-time, nullable: true }
        valid_to: { type: string, format: date-time, nullable: true }
        evidence:
          type: array
          items:
            type: object
            properties:
              event_id: { type: string }
            required: [event_id]
        scope:
          type: object
          properties:
            service: { type: string }
            env: { type: string }
            team: { type: string }
      required: [id, text, type]
    Relationship:
      type: object
      properties:
        id: { type: string }
        type:
          type: string
          enum: [supports, contradicts, causes, caused_by, action_of, outcome_of, validates, refutes, derived_from]
        from_claim_id: { type: string }
        to_claim_id: { type: string }
        created_at: { type: string, format: date-time }
      required: [id, type, from_claim_id, to_claim_id]
    Embedding:
      type: object
      properties:
        entity_id: { type: string }
        entity_type: { type: string, enum: [event, claim] }
        model: { type: string }
        vector:
          type: array
          items: { type: number, format: double }
      required: [entity_id, entity_type, vector]
    AppendSummary:
      type: object
      properties:
        appended: { type: integer }
        skipped: { type: integer }
      required: [appended]
    Metrics:
      type: object
      properties:
        events: { type: integer }
        claims: { type: integer }
        relationships: { type: integer }
        contradictions: { type: integer }
        avg_trust: { type: number, format: double }
        low_trust_count: { type: integer }
        claims_by_type:
          type: object
          additionalProperties: { type: integer }
        claims_by_status:
          type: object
          additionalProperties: { type: integer }
    Expert:
      type: object
      properties:
        worker: { type: string }
        affinity: { type: number, format: double }
        reliability: { type: number, format: double }
        claim_count: { type: integer }
      required: [worker, affinity, reliability, claim_count]
    KnowledgeGap:
      type: object
      properties:
        claim_id: { type: string }
        text: { type: string }
        kind: { type: string }
        score: { type: number, format: double }
      required: [claim_id, text, kind, score]
    CalibrationBucket:
      type: object
      properties:
        lower: { type: number, format: double }
        upper: { type: number, format: double }
        count: { type: integer }
        mean_confidence: { type: number, format: double }
        accuracy: { type: number, format: double }
      required: [lower, upper, count, mean_confidence, accuracy]
    CalibrationSource:
      type: object
      properties:
        source: { type: string }
        samples: { type: integer }
        mean_confidence: { type: number, format: double }
        accuracy: { type: number, format: double }
        gap: { type: number, format: double }
        brier: { type: number, format: double }
      required: [source, samples, mean_confidence, accuracy, gap, brier]
    Calibration:
      type: object
      properties:
        samples: { type: integer }
        ece: { type: number, format: double }
        brier: { type: number, format: double }
        buckets:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/CalibrationBucket" }
        sources:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/CalibrationSource" }
      required: [samples, ece, brier]
    Hypercorrection:
      type: object
      properties:
        contradicted_claim_id: { type: string }
        contradicted_text: { type: string }
        contradicted_trust: { type: number, format: double }
        contradicted_promoted: { type: boolean }
        challenging_claim_id: { type: string }
        challenging_text: { type: string }
        detected_at: { type: string, format: date-time }
      required: [contradicted_claim_id, challenging_claim_id]
    Recombination:
      type: object
      properties:
        claim_a: { type: string }
        text_a: { type: string }
        claim_b: { type: string }
        text_b: { type: string }
        similarity: { type: number, format: double }
      required: [claim_a, text_a, claim_b, text_b, similarity]
    Assimilation:
      type: object
      description: Novelty verdict for a candidate statement.
      properties:
        kind: { type: string }
        anchor_id: { type: string }
        anchor_text: { type: string }
        confidence: { type: number, format: double }
      required: [kind, confidence]
    Decision:
      type: object
      properties:
        id: { type: string }
        statement: { type: string }
        plan: { type: string }
        reasoning: { type: string }
        risk_level: { type: string }
        beliefs:
          type: array
          items: { type: string }
        alternatives:
          type: array
          items: { type: string }
        outcome_id: { type: string }
        chosen_at: { type: string, format: date-time }
      required: [id, statement]
    RecallResult:
      type: object
      properties:
        claim_id: { type: string }
        text: { type: string }
        type: { type: string }
        confidence: { type: number, format: double }
        trust_score: { type: number, format: double }
        hop_distance: { type: integer }
        provenance: { type: string }
      required: [claim_id, text, type, confidence, trust_score, hop_distance]
    RecallSufficiency:
      type: object
      properties:
        confidence: { type: number, format: double }
        claim_count: { type: integer }
        sufficient: { type: boolean }
        floor: { type: number, format: double }
      required: [confidence, claim_count, sufficient, floor]
    RecallEffort:
      type: object
      properties:
        budget: { type: number, format: double }
        passes: { type: integer }
        hops: { type: integer }
        breadth: { type: integer }
      required: [budget, passes, hops, breadth]
    RecallConflict:
      type: object
      properties:
        claim_id: { type: string }
        claim_text: { type: string }
        contradicting_id: { type: string }
        contradicting_text: { type: string }
        contradicting_trust: { type: number, format: double }
      required: [claim_id, claim_text, contradicting_id, contradicting_text, contradicting_trust]
    RecallResponse:
      type: object
      description: |
        Union response for `/v1/recall`. `results` is always present; the
        remaining fields are populated only for the matching `mode`:
        `sufficiency` (mode=sufficiency or effort), `effort` (mode=effort),
        `conflicts` (mode=conflicts), `rounds` (mode=iterative).
      properties:
        mode: { type: string, enum: [sufficiency, effort, context, conflicts, iterative] }
        results:
          type: array
          items: { $ref: "#/components/schemas/RecallResult" }
        sufficiency: { $ref: "#/components/schemas/RecallSufficiency" }
        effort: { $ref: "#/components/schemas/RecallEffort" }
        conflicts:
          type: array
          items: { $ref: "#/components/schemas/RecallConflict" }
        rounds: { type: integer }
      required: [mode, results]
    WorkingMemoryBlock:
      type: object
      properties:
        owner: { type: string }
        label: { type: string }
        value: { type: string }
        updated_at: { type: string, format: date-time }
      required: [owner, label, value]
    TimelineEvent:
      type: object
      properties:
        id: { type: string }
        at: { type: string, format: date-time }
        type: { type: string }
        content: { type: string }
        run_id: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }
      required: [id, type, content]
    Signal:
      type: object
      properties:
        pattern: { type: string }
        run_id: { type: string }
        strength: { type: number, format: double }
        confidence: { type: number, format: double }
        class: { type: string }
        detected_at: { type: string, format: date-time }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
      required: [pattern, strength, confidence]
