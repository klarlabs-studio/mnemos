apiVersion: rollops.klarlabs.de/v1
kind: RolloutConfig
metadata:
  name: hermes-mnemos
spec:
  target:
    kind: kubernetes
    ref: hermes/prod/mnemos
    criticality: high
    spec:
      namespace: hermes
      resource: deployment/mnemos
      image: ghcr.io/klarlabs-studio/mnemos:latest@sha256:302d2f9fb70295d087a1b1e2a3f579490910852e56b5f053571aa895afab1cdc
      manifest: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          labels:
            app.kubernetes.io/name: mnemos
          name: mnemos
          namespace: hermes
        spec:
          progressDeadlineSeconds: 600
          replicas: 1
          revisionHistoryLimit: 10
          selector:
            matchLabels:
              app.kubernetes.io/name: mnemos
          strategy:
            type: Recreate
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/restartedAt: '2026-05-31T20:31:16+02:00'
              labels:
                app.kubernetes.io/name: mnemos
            spec:
              containers:
              - args:
                - serve
                - --port
                - '7777'
                env:
                - name: MNEMOS_DATA_DIR
                  value: /data
                - name: HOME
                  value: /data
                image: ghcr.io/klarlabs-studio/mnemos:latest
                imagePullPolicy: Always
                livenessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /health
                    port: 7777
                    scheme: HTTP
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  successThreshold: 1
                  timeoutSeconds: 1
                name: mnemos
                ports:
                - containerPort: 7777
                  name: http
                  protocol: TCP
                readinessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /health
                    port: 7777
                    scheme: HTTP
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  successThreshold: 1
                  timeoutSeconds: 1
                resources:
                  limits:
                    cpu: 500m
                    memory: 512Mi
                  requests:
                    cpu: 50m
                    memory: 96Mi
                terminationMessagePath: /dev/termination-log
                terminationMessagePolicy: File
                volumeMounts:
                - mountPath: /data
                  name: data
              dnsPolicy: ClusterFirst
              nodeSelector:
                kubernetes.io/hostname: edge-1
              restartPolicy: Always
              schedulerName: default-scheduler
              securityContext: {}
              terminationGracePeriodSeconds: 30
              volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: mnemos-data
  strategy:
    type: rolling
  verification: shallow
  imagePolicy:
    mode: digest
    allowMutableTags: true
