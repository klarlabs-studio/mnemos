# Benchmark stack — runs Mnemos + competitors side-by-side so the
# harness can hit each one through a common interface.
#
# Each provider ships behind a stable hostname inside the bench
# network; the harness connects via published localhost ports.
#
# Run:
#   export OPENAI_API_KEY=sk-...        # required by mem0/zep/letta defaults
#   export MNEMOS_JWT_SECRET=$(openssl rand -hex 32)
#   docker compose -f benchmarks/docker-compose.yml up -d
#   python -m benchmarks.run --provider all --suite all
#   docker compose -f benchmarks/docker-compose.yml down -v
#
# Providers can be added incrementally — comment out the ones whose
# adapters aren't ready yet.

services:
  # --- Mnemos ---------------------------------------------------------
  mnemos-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mnemos
      POSTGRES_PASSWORD: mnemos
      POSTGRES_DB: mnemos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemos"]
      interval: 5s
      timeout: 5s
      retries: 10

  mnemos:
    image: ghcr.io/felixgeelhaar/mnemos:${MNEMOS_TAG:-0.13.0}
    environment:
      MNEMOS_DB_URL: "postgres://mnemos:mnemos@mnemos-postgres:5432/mnemos?sslmode=disable"
      MNEMOS_SERVE_PORT: "7777"
      MNEMOS_JWT_SECRET: ${MNEMOS_JWT_SECRET:?set MNEMOS_JWT_SECRET}
      # LLM-driven claim extraction lifts contradiction-detection on
      # entity/numeric/temporal conflicts the rule-based path misses.
      MNEMOS_LLM_PROVIDER: ${MNEMOS_LLM_PROVIDER:-openai}
      MNEMOS_LLM_API_KEY: ${MNEMOS_LLM_API_KEY:?set MNEMOS_LLM_API_KEY}
      MNEMOS_LLM_MODEL: ${MNEMOS_LLM_MODEL:-gpt-4o-mini}
    command: ["serve"]
    depends_on:
      mnemos-postgres:
        condition: service_healthy
    ports:
      - "7777:7777"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7777/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- mem0 OSS server ------------------------------------------------
  # mem0 has no published Docker Hub image; their server is built from
  # source via server/dev.Dockerfile in the mem0ai/mem0 repo. To run
  # mem0 in this stack: clone mem0ai/mem0 next to this repo, then
  # uncomment below and adjust build.context to point at it.
  #
  # mem0-postgres:
  #   image: ankane/pgvector:v0.5.1
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: postgres
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #
  # mem0:
  #   build:
  #     context: ../../mem0
  #     dockerfile: server/dev.Dockerfile
  #   environment:
  #     AUTH_DISABLED: "true"
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
  #     DATABASE_HOST: mem0-postgres
  #     ...

  # --- zep OSS server -------------------------------------------------
  # Adapter: benchmarks/providers/zep.py (uncomment to enable in stack).
  # zep-postgres:
  #   image: ankane/pgvector:latest
  #   environment:
  #     POSTGRES_USER: zep
  #     POSTGRES_PASSWORD: zep
  #     POSTGRES_DB: zep
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U zep"]
  #     interval: 5s
  #
  # zep:
  #   image: ghcr.io/getzep/zep:latest
  #   depends_on:
  #     zep-postgres: { condition: service_healthy }
  #   environment:
  #     ZEP_STORE_TYPE: postgres
  #     ZEP_STORE_POSTGRES_DSN: postgres://zep:zep@zep-postgres:5432/zep?sslmode=disable
  #     ZEP_OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
  #   ports: ["8000:8000"]

  # --- letta OSS server -----------------------------------------------
  # Adapter: benchmarks/providers/letta.py (uncomment to enable in stack).
  # letta:
  #   image: letta/letta:latest
  #   environment:
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
  #     LETTA_PG_URI: postgres://letta:letta@letta-postgres:5432/letta?sslmode=disable
  #   depends_on:
  #     letta-postgres: { condition: service_healthy }
  #   ports: ["8283:8283"]
  #
  # letta-postgres:
  #   image: ankane/pgvector:latest
  #   environment:
  #     POSTGRES_USER: letta
  #     POSTGRES_PASSWORD: letta
  #     POSTGRES_DB: letta
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U letta"]
  #     interval: 5s
