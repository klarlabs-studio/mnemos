<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mnemos Registry</title>
<style>
  :root {
    --fg: #1a1a1a;
    --bg: #fafaf7;
    --muted: #6b6b6b;
    --border: #e5e5e0;
    --accent: #0b5fff;
    --warn: #b04a00;
    --pill-bg: #f0f0eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 15px/1.5 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--fg);
    background: var(--bg);
    padding: 32px max(16px, calc((100vw - 880px) / 2));
  }
  header {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px;
  }
  header h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  header .meta { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
  .metrics { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 28px; }
  .metric { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; min-width: 110px; }
  .metric .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric .value { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 4px; }
  .metric.warn .value { color: var(--warn); }
  section { margin-bottom: 36px; }
  section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 0 0 12px; font-weight: 600; }
  .row { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
  .row .text { line-height: 1.45; }
  .row .pill {
    display: inline-block; background: var(--pill-bg); color: var(--muted);
    font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-right: 6px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .row.contradicts { border-left: 3px solid var(--warn); }
  .row .from-to { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: ui-monospace, monospace; }
  .controls { display: flex; gap: 8px; margin-bottom: 12px; }
  .controls select, .controls input {
    border: 1px solid var(--border); background: white; border-radius: 4px;
    padding: 6px 10px; font: inherit; color: inherit;
  }
  .pagination { color: var(--muted); font-size: 13px; margin-top: 8px; display: flex; gap: 12px; align-items: center; }
  .pagination button {
    background: white; border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 10px; cursor: pointer; font: inherit;
  }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
  .error { color: var(--warn); padding: 8px 0; }
</style>
</head>
<body>
<header>
  <h1>Mnemos Registry</h1>
  <nav style="font-size:14px;">
    <a href="/" style="color:var(--muted);text-decoration:none;margin-left:16px;">← Back to Home</a>
  </nav>
  <div class="meta" id="meta">loading…</div>
</header>

<section id="metrics-section">
  <h2>Knowledge base</h2>
  <div class="metrics" id="metrics"></div>
</section>

<section id="claims-section">
  <h2>Claims</h2>
  <div class="controls">
    <select id="claim-type">
      <option value="">All types</option>
      <option value="fact">Fact</option>
      <option value="hypothesis">Hypothesis</option>
      <option value="decision">Decision</option>
    </select>
    <select id="claim-status">
      <option value="">All statuses</option>
      <option value="active">Active</option>
      <option value="contested">Contested</option>
      <option value="resolved">Resolved</option>
      <option value="deprecated">Deprecated</option>
    </select>
  </div>
  <div id="claims"></div>
  <div class="pagination" id="claims-pagination"></div>
</section>

<section id="contradictions-section">
  <h2>Contradictions</h2>
  <div id="contradictions"></div>
  <div class="pagination" id="contradictions-pagination"></div>
</section>

<script>
const PAGE_SIZE = 25;
const claimsState = { offset: 0, total: 0, type: '', status: '' };
const contradictionsState = { offset: 0, total: 0 };

async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
  return resp.json();
}

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

async function loadHealth() {
  try {
    const h = await fetchJSON('/health');
    document.getElementById('meta').textContent = `mnemos ${h.version}`;
  } catch (e) {
    document.getElementById('meta').textContent = 'offline';
  }
}

async function loadMetrics() {
  const m = await fetchJSON('/v1/metrics');
  const cards = [
    { label: 'Events', value: m.events },
    { label: 'Claims', value: m.claims },
    { label: 'Contested', value: m.contested_claims, warn: m.contested_claims > 0 },
    { label: 'Relationships', value: m.relationships },
    { label: 'Contradictions', value: m.contradictions, warn: m.contradictions > 0 },
    { label: 'Embeddings', value: m.embeddings },
  ];
  const root = document.getElementById('metrics');
  root.innerHTML = '';
  for (const c of cards) {
    root.appendChild(el('div', { class: 'metric' + (c.warn ? ' warn' : '') },
      el('div', { class: 'label' }, c.label),
      el('div', { class: 'value' }, String(c.value))));
  }
}

async function loadClaims() {
  const params = new URLSearchParams({
    limit: String(PAGE_SIZE),
    offset: String(claimsState.offset),
  });
  if (claimsState.type) params.set('type', claimsState.type);
  if (claimsState.status) params.set('status', claimsState.status);

  const root = document.getElementById('claims');
  root.innerHTML = '';
  try {
    const data = await fetchJSON('/v1/beliefs?' + params);
    claimsState.total = data.total;
    if (!data.beliefs || data.beliefs.length === 0) {
      root.appendChild(el('div', { class: 'empty' }, 'No beliefs match these filters.'));
    } else {
      for (const c of data.beliefs) {
        root.appendChild(el('div', { class: 'row' },
          el('span', { class: 'pill' }, c.type),
          el('span', { class: 'pill' }, c.status),
          el('span', { class: 'pill' }, `conf ${(c.confidence * 100).toFixed(0)}%`),
          el('div', { class: 'text' }, c.text)));
      }
    }
    renderPagination('claims-pagination', claimsState, loadClaims);
  } catch (e) {
    root.appendChild(el('div', { class: 'error' }, `Error: ${e.message}`));
  }
}

async function loadContradictions() {
  const params = new URLSearchParams({
    limit: String(PAGE_SIZE),
    offset: String(contradictionsState.offset),
    type: 'contradicts',
  });
  const root = document.getElementById('contradictions');
  root.innerHTML = '';
  try {
    const data = await fetchJSON('/v1/associations?' + params);
    contradictionsState.total = data.total;
    if (!data.associations || data.associations.length === 0) {
      root.appendChild(el('div', { class: 'empty' }, 'No contradictions found.'));
    } else {
      for (const r of data.associations) {
        root.appendChild(el('div', { class: 'row contradicts' },
          el('div', { class: 'text' }, `${r.from_belief_id} contradicts ${r.to_belief_id}`),
          el('div', { class: 'from-to' }, new Date(r.created_at).toLocaleString())));
      }
    }
    renderPagination('contradictions-pagination', contradictionsState, loadContradictions);
  } catch (e) {
    root.appendChild(el('div', { class: 'error' }, `Error: ${e.message}`));
  }
}

function renderPagination(id, state, loader) {
  const root = document.getElementById(id);
  root.innerHTML = '';
  if (state.total <= PAGE_SIZE) return;
  const prev = el('button', { type: 'button' }, 'Prev');
  prev.disabled = state.offset === 0;
  prev.onclick = () => { state.offset = Math.max(0, state.offset - PAGE_SIZE); loader(); };
  const next = el('button', { type: 'button' }, 'Next');
  next.disabled = state.offset + PAGE_SIZE >= state.total;
  next.onclick = () => { state.offset += PAGE_SIZE; loader(); };
  const pos = `${state.offset + 1}–${Math.min(state.offset + PAGE_SIZE, state.total)} of ${state.total}`;
  root.appendChild(prev);
  root.appendChild(next);
  root.appendChild(el('span', {}, pos));
}

document.getElementById('claim-type').addEventListener('change', (e) => {
  claimsState.type = e.target.value;
  claimsState.offset = 0;
  loadClaims();
});
document.getElementById('claim-status').addEventListener('change', (e) => {
  claimsState.status = e.target.value;
  claimsState.offset = 0;
  loadClaims();
});

loadHealth();
loadMetrics();
loadClaims();
loadContradictions();
</script>
</body>
</html>
