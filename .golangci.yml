version: "2"

run:
  timeout: 5m

linters:
  # Org engineering bar (klarlabs-studio golangci.reference.yml) merged with
  # mnemos-specific opt-ins. gocritic is part of the shared gate and must stay
  # enabled; code-level security is owned by nox (taint-analysis + core
  # ruleset), not gosec. revive is a repo-specific opt-in (exported-symbol docs).
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop
    - revive       # repo-specific: enforce exported-symbol documentation

  settings:
    revive:
      rules:
        - name: exported
          severity: warning
          arguments:
            - checkPrivateReceivers
    gocritic:
      disabled-checks:
        # `unlambda` flags trivial wrapper closures that document the
        # call shape — keeping them helps grep-ability for the MCP
        # capability registry.
        - unlambda
        # `singleCaseSwitch` is fine when the switch is reserved for
        # future expansion alongside a constant set.
        - singleCaseSwitch
        # `exitAfterDefer` is intentional for stdio entrypoints
        # (cmd/mnemos/mcp.go) where log.Fatal is the documented exit
        # path on bootstrap failure.
        - exitAfterDefer

  exclusions:
    rules:
      # Test helpers keep constant-valued params and symmetric return
      # values for readability and future fixtures; unparam is noise here.
      - linters: [unparam]
        path: _test\.go
    paths:
      - data/eval

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
