syntax = "proto3";

package mnemos.v1;

option go_package = "go.klarlabs.de/mnemos/proto/gen/mnemos/v1;mnemosv1";

import "google/protobuf/timestamp.proto";

// MnemosService provides the gRPC API surface for the Mnemos knowledge
// registry. It mirrors the HTTP REST API at /v1/* with equivalent
// operations for events, claims, relationships, embeddings, and metrics.
service MnemosService {
  // Health returns the service health status. Deep probes are available
  // via the detailed field.
  rpc Health(HealthRequest) returns (HealthResponse);

  // ListEvents returns a paginated list of all events, most recent first.
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);

  // AppendEvents writes one or more events to the store. Idempotent on
  // duplicate event IDs.
  rpc AppendEvents(AppendEventsRequest) returns (AppendResponse);

  // ListClaims returns a paginated list of claims with optional type/status
  // filtering. Evidence links are included when include_evidence is true.
  rpc ListClaims(ListClaimsRequest) returns (ListClaimsResponse);

  // AppendClaims writes claims and optionally their evidence links.
  rpc AppendClaims(AppendClaimsRequest) returns (AppendResponse);

  // ListRelationships returns a paginated list of relationships with
  // optional type filtering.
  rpc ListRelationships(ListRelationshipsRequest) returns (ListRelationshipsResponse);

  // AppendRelationships writes one or more relationship edges.
  rpc AppendRelationships(AppendRelationshipsRequest) returns (AppendResponse);

  // ListEmbeddings returns a paginated list of embeddings with optional
  // entity_type filtering.
  rpc ListEmbeddings(ListEmbeddingsRequest) returns (ListEmbeddingsResponse);

  // AppendEmbeddings writes one or more embedding vectors.
  rpc AppendEmbeddings(AppendEmbeddingsRequest) returns (AppendResponse);

  // Metrics returns aggregate counts for the knowledge base.
  rpc Metrics(MetricsRequest) returns (MetricsResponse);

  // ---- Phase 2-7 entities ---------------------------------------------------

  // ListActions returns recorded operational actions.
  rpc ListActions(ListActionsRequest) returns (ListActionsResponse);
  // AppendActions writes operational actions idempotently.
  rpc AppendActions(AppendActionsRequest) returns (AppendResponse);

  // ListOutcomes returns observed action outcomes.
  rpc ListOutcomes(ListOutcomesRequest) returns (ListOutcomesResponse);
  // AppendOutcomes writes outcomes idempotently. Auto-edges to the
  // parent action are NOT emitted server-side here; that wiring is
  // done by the higher-level CLI/MCP surface and stays out of the
  // raw write path.
  rpc AppendOutcomes(AppendOutcomesRequest) returns (AppendResponse);

  // ListLessons returns synthesised lessons.
  rpc ListLessons(ListLessonsRequest) returns (ListLessonsResponse);
  // AppendLessons writes lessons idempotently (UPSERT on id refreshes
  // confidence/last_verified, snapshots prior to lesson_versions).
  rpc AppendLessons(AppendLessonsRequest) returns (AppendResponse);

  // ListDecisions returns recorded decisions.
  rpc ListDecisions(ListDecisionsRequest) returns (ListDecisionsResponse);
  // AppendDecisions writes decisions idempotently.
  rpc AppendDecisions(AppendDecisionsRequest) returns (AppendResponse);

  // ListPlaybooks returns synthesised or hand-authored playbooks.
  rpc ListPlaybooks(ListPlaybooksRequest) returns (ListPlaybooksResponse);
  // AppendPlaybooks writes playbooks idempotently.
  rpc AppendPlaybooks(AppendPlaybooksRequest) returns (AppendResponse);

  // ListEntityRelationships returns polymorphic cross-entity edges.
  rpc ListEntityRelationships(ListEntityRelationshipsRequest) returns (ListEntityRelationshipsResponse);
  // AppendEntityRelationships writes polymorphic edges idempotently.
  rpc AppendEntityRelationships(AppendEntityRelationshipsRequest) returns (AppendResponse);

  // --- Connected brain (cognitive layer; parity with HTTP /v1/who-knows etc.) ---
  // WhoKnows ranks the workers whose memory best matches a query.
  rpc WhoKnows(WhoKnowsRequest) returns (WhoKnowsResponse);
  // KnowledgeGaps lists the store's highest-value open questions.
  rpc KnowledgeGaps(KnowledgeGapsRequest) returns (KnowledgeGapsResponse);
  // Calibration reports how well stated confidence tracks reality.
  rpc Calibration(CalibrationRequest) returns (CalibrationResponse);
  // Hypercorrections lists established beliefs a newer claim contradicts.
  rpc Hypercorrections(HypercorrectionsRequest) returns (HypercorrectionsResponse);
  // Recombinations lists topically-similar-but-unlinked claim pairs.
  rpc Recombinations(RecombinationsRequest) returns (RecombinationsResponse);
  // AnalogousClaims returns the claims most structurally analogous to one.
  rpc AnalogousClaims(AnalogousClaimsRequest) returns (AnalogousClaimsResponse);
}

// ---------------------------------------------------------------------------
// Common types
// ---------------------------------------------------------------------------

message Pagination {
  int32 limit  = 1;
  int32 offset = 2;
}

// ---------------------------------------------------------------------------
// Health
// ---------------------------------------------------------------------------

message HealthRequest {
  bool detailed = 1;
}

message HealthResponse {
  string status  = 1;
  string version = 2;
  bool   healthy = 3;
}

// ---------------------------------------------------------------------------
// Events
// ---------------------------------------------------------------------------

message Event {
  string                 id             = 1;
  string                 run_id         = 2;
  string                 schema_version = 3;
  string                 content        = 4;
  string                 source_input_id = 5;
  google.protobuf.Timestamp timestamp   = 6;
  map<string, string>    metadata       = 7;
  google.protobuf.Timestamp ingested_at = 8;
}

message ListEventsRequest {
  Pagination pagination = 1;
}

message ListEventsResponse {
  repeated Event events = 1;
  int32          total  = 2;
  int32          limit  = 3;
  int32          offset = 4;
}

message AppendEventsRequest {
  repeated Event events = 1;
}

// ---------------------------------------------------------------------------
// Claims
// ---------------------------------------------------------------------------

message Claim {
  string    id         = 1;
  string    text       = 2;
  string    type       = 3;
  double    confidence = 4;
  string    status     = 5;
  google.protobuf.Timestamp created_at = 6;
  // visibility gates audience access: personal | team | org.
  // Empty string is treated as "team" by the server.
  string    visibility = 7;
}

message ClaimEvidence {
  string claim_id = 1;
  string event_id = 2;
}

message ListClaimsRequest {
  Pagination pagination        = 1;
  string     type_filter       = 2;
  string     status_filter     = 3;
  bool       include_evidence  = 4;
  // run_id: when set, only returns claims with ≥1 evidence link to an
  // event whose RunID equals this value. Foundational tenant filter for
  // integrators that scope memory by run_id prefix (e.g. animal:<uuid>).
  // Claims with no evidence are excluded — fail closed.
  string     run_id            = 5;
  // as_of: validity-time filter. When set, only returns claims that
  // were valid at this timestamp (valid_from <= as_of AND (valid_to is
  // zero OR as_of < valid_to)). Mirrors the HTTP ?as_of= query param —
  // gRPC parity for Zep-style time-travel reads.
  google.protobuf.Timestamp as_of = 6;
  // recorded_as_of: ingestion-time filter. When set, drops claims
  // recorded after this timestamp so the response is reproducible
  // from the snapshot of the store as it stood then.
  google.protobuf.Timestamp recorded_as_of = 7;
}

message ListClaimsResponse {
  repeated Claim         claims   = 1;
  repeated ClaimEvidence evidence = 2;
  int32                  total    = 3;
  int32                  limit    = 4;
  int32                  offset   = 5;
}

message AppendClaimsRequest {
  repeated Claim         claims   = 1;
  repeated ClaimEvidence evidence = 2;
}

// ---------------------------------------------------------------------------
// Relationships
// ---------------------------------------------------------------------------

message Relationship {
  string    id            = 1;
  string    type          = 2;
  string    from_claim_id = 3;
  string    to_claim_id   = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ListRelationshipsRequest {
  Pagination pagination  = 1;
  string     type_filter = 2;
}

message ListRelationshipsResponse {
  repeated Relationship relationships = 1;
  int32                   total       = 2;
  int32                   limit       = 3;
  int32                   offset      = 4;
}

message AppendRelationshipsRequest {
  repeated Relationship relationships = 1;
}

// ---------------------------------------------------------------------------
// Embeddings
// ---------------------------------------------------------------------------

message Embedding {
  string    entity_id   = 1;
  string    entity_type = 2;
  repeated float vector = 3;
  string    model       = 4;
  int32     dimensions  = 5;
}

message ListEmbeddingsRequest {
  Pagination pagination  = 1;
  string     entity_type = 2; // "event" or "claim"; empty = all
}

message ListEmbeddingsResponse {
  repeated Embedding embeddings = 1;
  int32              total      = 2;
  int32              limit      = 3;
  int32              offset     = 4;
}

message AppendEmbeddingsRequest {
  repeated Embedding embeddings = 1;
}

// ---------------------------------------------------------------------------
// Common response
// ---------------------------------------------------------------------------

message AppendResponse {
  int32 accepted = 1;
  int32 skipped  = 2;
}

// ---------------------------------------------------------------------------
// Metrics
// ---------------------------------------------------------------------------

message MetricsRequest {}

message MetricsResponse {
  int64 runs             = 1;
  int64 events           = 2;
  int64 claims           = 3;
  int64 contested_claims = 4;
  int64 relationships    = 5;
  int64 contradictions   = 6;
  int64 embeddings       = 7;
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

message Action {
  string                     id            = 1;
  string                     run_id        = 2;
  string                     kind          = 3;
  string                     subject       = 4;
  string                     actor         = 5;
  google.protobuf.Timestamp  at            = 6;
  map<string, string>        metadata      = 7;
  string                     created_by    = 8;
  google.protobuf.Timestamp  created_at    = 9;
}

message ListActionsRequest {
  Pagination pagination = 1;
  string     subject    = 2; // optional filter; empty = all
  string     run_id     = 3; // optional filter; empty = all
}

message ListActionsResponse {
  repeated Action actions = 1;
  int32           total   = 2;
  int32           limit   = 3;
  int32           offset  = 4;
}

message AppendActionsRequest { repeated Action actions = 1; }

// ---------------------------------------------------------------------------
// Outcomes
// ---------------------------------------------------------------------------

message Outcome {
  string                    id          = 1;
  string                    action_id   = 2;
  string                    result      = 3; // success | failure | partial | unknown
  map<string, double>       metrics     = 4;
  string                    notes       = 5;
  google.protobuf.Timestamp observed_at = 6;
  string                    source      = 7; // "push" or "pull:<adapter>"
  string                    created_by  = 8;
  google.protobuf.Timestamp created_at  = 9;
}

message ListOutcomesRequest {
  Pagination pagination = 1;
  string     action_id  = 2; // optional filter
}

message ListOutcomesResponse {
  repeated Outcome outcomes = 1;
  int32            total    = 2;
  int32            limit    = 3;
  int32            offset   = 4;
}

message AppendOutcomesRequest { repeated Outcome outcomes = 1; }

// ---------------------------------------------------------------------------
// Lessons
// ---------------------------------------------------------------------------

message Scope {
  string service = 1;
  string env     = 2;
  string team    = 3;
}

message Lesson {
  string                    id             = 1;
  string                    statement      = 2;
  Scope                     scope          = 3;
  string                    trigger        = 4;
  string                    kind           = 5;
  repeated string           evidence       = 6;
  double                    confidence     = 7;
  google.protobuf.Timestamp derived_at     = 8;
  google.protobuf.Timestamp last_verified  = 9;
  string                    source         = 10;
  string                    created_by     = 11;
}

message ListLessonsRequest {
  Pagination pagination = 1;
  string     service    = 2; // optional scope filter
  string     trigger    = 3; // optional trigger filter
}

message ListLessonsResponse {
  repeated Lesson lessons = 1;
  int32           total   = 2;
  int32           limit   = 3;
  int32           offset  = 4;
}

message AppendLessonsRequest { repeated Lesson lessons = 1; }

// ---------------------------------------------------------------------------
// Decisions
// ---------------------------------------------------------------------------

message Decision {
  string                    id           = 1;
  string                    statement    = 2;
  string                    plan         = 3;
  string                    reasoning    = 4;
  string                    risk_level   = 5;
  repeated string           beliefs      = 6;
  repeated string           alternatives = 7;
  string                    outcome_id   = 8;
  Scope                     scope        = 9;
  google.protobuf.Timestamp chosen_at    = 10;
  string                    created_by   = 11;
  google.protobuf.Timestamp created_at   = 12;
}

message ListDecisionsRequest {
  Pagination pagination = 1;
  string     risk_level = 2; // optional filter
}

message ListDecisionsResponse {
  repeated Decision decisions = 1;
  int32             total     = 2;
  int32             limit     = 3;
  int32             offset    = 4;
}

message AppendDecisionsRequest { repeated Decision decisions = 1; }

// ---------------------------------------------------------------------------
// Playbooks
// ---------------------------------------------------------------------------

message PlaybookStep {
  int32  order       = 1;
  string action      = 2;
  string description = 3;
  string condition   = 4;
}

message Playbook {
  string                    id                   = 1;
  string                    trigger              = 2;
  string                    statement            = 3;
  Scope                     scope                = 4;
  repeated PlaybookStep     steps                = 5;
  repeated string           derived_from_lessons = 6;
  double                    confidence           = 7;
  google.protobuf.Timestamp derived_at           = 8;
  google.protobuf.Timestamp last_verified        = 9;
  string                    source               = 10;
  string                    created_by           = 11;
}

message ListPlaybooksRequest {
  Pagination pagination = 1;
  string     trigger    = 2; // optional filter
  string     service    = 3; // optional scope filter
}

message ListPlaybooksResponse {
  repeated Playbook playbooks = 1;
  int32             total     = 2;
  int32             limit     = 3;
  int32             offset    = 4;
}

message AppendPlaybooksRequest { repeated Playbook playbooks = 1; }

// ---------------------------------------------------------------------------
// EntityRelationships
// ---------------------------------------------------------------------------

message EntityRelationship {
  string                    id         = 1;
  string                    kind       = 2;
  string                    from_id    = 3;
  string                    from_type  = 4;
  string                    to_id      = 5;
  string                    to_type    = 6;
  google.protobuf.Timestamp created_at = 7;
  string                    created_by = 8;
}

message ListEntityRelationshipsRequest {
  Pagination pagination  = 1;
  string     kind        = 2; // optional filter
  string     entity_id   = 3; // optional: list edges touching this entity
  string     entity_type = 4; // required when entity_id is set
}

message ListEntityRelationshipsResponse {
  repeated EntityRelationship edges  = 1;
  int32                       total  = 2;
  int32                       limit  = 3;
  int32                       offset = 4;
}

message AppendEntityRelationshipsRequest { repeated EntityRelationship edges = 1; }

// ---------------------------------------------------------------------------
// Connected brain (cognitive layer)
// ---------------------------------------------------------------------------

message WhoKnowsRequest {
  string query = 1;
  int32  limit = 2;
}
message Expert {
  string worker      = 1;
  double affinity    = 2;
  double reliability = 3;
  int32  claim_count = 4;
}
message WhoKnowsResponse {
  string          query   = 1;
  repeated Expert experts = 2;
}

message KnowledgeGapsRequest { int32 limit = 1; }
message Gap {
  string claim_id = 1;
  string text     = 2;
  string kind     = 3;
  double score    = 4;
}
message KnowledgeGapsResponse { repeated Gap gaps = 1; }

message CalibrationRequest {}
message CalibrationBucket {
  double lower           = 1;
  double upper           = 2;
  int32  count           = 3;
  double mean_confidence = 4;
  double accuracy        = 5;
}
message CalibrationSource {
  string source          = 1;
  int32  samples         = 2;
  double mean_confidence = 3;
  double accuracy        = 4;
  double gap             = 5;
  double brier           = 6;
}
message CalibrationResponse {
  int32                      samples = 1;
  double                     ece     = 2;
  double                     brier   = 3;
  repeated CalibrationBucket buckets = 4;
  repeated CalibrationSource sources = 5;
}

message HypercorrectionsRequest {}
message Hypercorrection {
  string                    contradicted_claim_id = 1;
  string                    contradicted_text     = 2;
  double                    contradicted_trust    = 3;
  bool                      contradicted_promoted = 4;
  string                    challenging_claim_id  = 5;
  string                    challenging_text      = 6;
  google.protobuf.Timestamp detected_at           = 7;
}
message HypercorrectionsResponse { repeated Hypercorrection hypercorrections = 1; }

message RecombinationsRequest { int32 limit = 1; }
message Recombination {
  string claim_a    = 1;
  string text_a     = 2;
  string claim_b    = 3;
  string text_b     = 4;
  double similarity = 5;
}
message RecombinationsResponse { repeated Recombination recombinations = 1; }

message AnalogousClaimsRequest {
  string claim_id = 1;
  int32  limit    = 2;
}
message Analogy {
  string claim_id   = 1;
  string text       = 2;
  double similarity = 3;
}
message AnalogousClaimsResponse {
  string           claim_id  = 1;
  repeated Analogy analogous = 2;
}
