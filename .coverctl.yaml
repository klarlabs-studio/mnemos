# Coverage policy for Mnemos.
#
# Thresholds match current coverage minus a 2pp buffer so flaky tail
# effects don't fail CI. Ratchet up via
# `coverctl suggest --strategy current --apply --force` after coverage
# rises. The buffer is intentional — coverage is a no-regression
# floor, not an aspirational target. Several domains start low after
# the v0.13 expansion (new bias, federation, glob/quota); raise as
# tests catch up.
version: 1
language: go
policy:
  default:
    min: 50
  domains:
    - name: kernel
      match:
        - ./internal/kernel/...
      # Library-core axi governance layer. Raised toward ~90% when the
      # governed-write fix pass added evidence-sink, session-capture,
      # budget, and bolt-adapter coverage (actual 91.5%). Floor sits ~2pp
      # below actual per the repo convention.
      min: 89
    - name: cmd
      match:
        - ./cmd/...
      min: 25
    - name: adapters
      match:
        - ./internal/adapters/...
      min: 60
    - name: auth
      match:
        - ./internal/auth/...
      min: 70
    - name: autoedge
      match:
        - ./internal/autoedge/...
      min: 73
    - name: bias
      match:
        - ./internal/bias/...
      min: 90
    - name: domain
      match:
        - ./internal/domain/...
      # Restored to 35 after a domain-level test for ProvenanceReport
      # round-trip plus Scope predicates lifted actual to 39%.
      min: 35
    - name: embedding
      match:
        - ./internal/embedding/...
      min: 50
    - name: extract
      match:
        - ./internal/extract/...
      min: 80
    - name: govwrite
      match:
        - ./internal/govwrite/...
      # Governed daemon-write surface (closes the daemon's direct-storage
      # bypass). Every write kind has an executor test asserting both
      # persistence and a verifiable evidence record (actual 74.2%). Floor
      # sits ~2pp below actual per the repo convention.
      min: 72
    - name: ingest
      match:
        - ./internal/ingest/...
      min: 60
    - name: llm
      match:
        - ./internal/llm/...
      min: 70
    - name: markdown
      match:
        - ./internal/markdown/...
      # Floor lowered 78 → 53 in v0.15.1; markdown coverage regressed at
      # d41ccf8 (memory-model alignment) when the new schema fields landed
      # without round-trip tests. Tracked as tech debt — restore to 78
      # once round-trip coverage on the new fields lands.
      min: 53
    - name: parser
      match:
        - ./internal/parser/...
      min: 70
    - name: pipeline
      match:
        - ./internal/pipeline/...
      min: 40
    - name: ports
      match:
        - ./internal/ports/...
      min: 0
    - name: query
      match:
        - ./internal/query/...
      min: 65
    - name: relate
      match:
        - ./internal/relate/...
      min: 80
    - name: server
      match:
        - ./internal/server/...
      min: 50
    - name: store
      match:
        - ./internal/store/...
      min: 15
    - name: synthesize
      match:
        - ./internal/synthesize/...
      min: 80
    - name: trust
      match:
        - ./internal/trust/...
      min: 88
    - name: workflow
      match:
        - ./internal/workflow/...
      min: 65
