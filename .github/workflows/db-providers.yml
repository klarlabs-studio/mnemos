name: DB Providers

# Postgres + MySQL integration tests. Split out of ci.yml when mnemos
# adopted the shared reusable Go CI workflow (the shared bar covers pure-Go
# unit/lint/build/security only). Triggers are preserved from the old ci.yml
# (push + PR to main) but narrowed with a path filter: these service-container
# tests only need to run when store/DB code or dependencies change.

on:
  push:
    branches: [main]
    paths:
      - "internal/store/**"
      - "internal/server/grpc/**"
      - "sql/**"
      - "sqlc.yaml"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/db-providers.yml"
  pull_request:
    branches: [main]
    paths:
      - "internal/store/**"
      - "internal/server/grpc/**"
      - "sql/**"
      - "sqlc.yaml"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/db-providers.yml"

permissions:
  contents: read

concurrency:
  group: db-providers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database-providers:
    name: Postgres + MySQL integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mnemos
          POSTGRES_PASSWORD: mnemos
          POSTGRES_DB: mnemos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mnemos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: mnemos
          MYSQL_DATABASE: mnemos
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Postgres + MySQL integration tests
        env:
          TEST_POSTGRES_DSN: postgres://mnemos:mnemos@127.0.0.1:5432/mnemos?sslmode=disable
          TEST_MYSQL_DSN: mysql://root:mnemos@127.0.0.1:3306/
        run: go test -race -count=1 ./internal/store/postgres/ ./internal/store/mysql/ ./internal/server/grpc/

      # ADR 0007 tenant isolation is enforced by Postgres RLS, which superusers
      # bypass — the default `mnemos` role above is a superuser, so the
      # isolation tests skip there. Create a NON-superuser role and re-run just
      # the cross-tenant isolation tests as it, so RLS is genuinely exercised.
      - name: Create non-superuser role for RLS isolation
        env:
          PGPASSWORD: mnemos
        run: |
          set -euo pipefail
          psql -h 127.0.0.1 -U mnemos -d mnemos -c \
            "CREATE ROLE app LOGIN PASSWORD 'app'; GRANT ALL ON SCHEMA public TO app; GRANT CREATE ON DATABASE mnemos TO app;"
          echo "role app (non-superuser): $(psql -h 127.0.0.1 -U mnemos -d mnemos -tAc "SELECT rolsuper||'/'||rolbypassrls FROM pg_roles WHERE rolname='app'")"
      - name: Run cross-tenant isolation tests (RLS enforced, non-superuser)
        env:
          TEST_POSTGRES_DSN: postgres://app:app@127.0.0.1:5432/mnemos?sslmode=disable
        run: go test -race -count=1 -run CrossTenantIsolation ./internal/store/postgres/ ./internal/server/grpc/
