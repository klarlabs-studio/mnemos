name: proto

# Guards the public API surface against accidental breaking changes.
# Runs on every PR and push to main:
#
#   - buf lint     — style + structural guardrails (STANDARD ruleset)
#   - buf breaking — wire + JSON breaking-change detection against main
#
# The breaking check uses main as the reference because the team is
# shipping pre-1.0 directly to main; once tags start landing this
# should switch to comparing against the most-recent tag instead.
# Paired with the same workflow in the chronos sister repo so a
# cognitive-stack refactor can't quietly break consumers of either
# service.

on:
  push:
    branches: [main]
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - '.github/workflows/proto.yml'
  pull_request:
    branches: [main]
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - '.github/workflows/proto.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: buf lint

      - name: Breaking-change check (against main)
        if: github.ref != 'refs/heads/main'
        # The PR checkout is a detached HEAD with no local `main` branch, so
        # buf's `.git#branch=main` can't resolve it. Materialise a local main
        # ref from origin first (fetch-depth: 0 already has the commits).
        run: |
          git fetch origin main:main 2>/dev/null || git branch -f main origin/main
          buf breaking --against ".git#branch=main"
