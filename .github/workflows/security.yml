name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 04:30 UTC for drift on dependencies / new rules.
    - cron: "30 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  nox-scan:
    name: Nox security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install nox
        id: install_nox
        # Best-effort install: try the public Homebrew tap, fall back to
        # skip with a clear note. When the install path stabilises (binary
        # release with deterministic asset URL), swap to a pinned
        # checksum download.
        run: |
          if command -v brew >/dev/null 2>&1 && \
             brew install felixgeelhaar/tap/nox 2>/dev/null; then
            echo "installed=1" >> "$GITHUB_OUTPUT"
            nox version
          else
            echo "installed=0" >> "$GITHUB_OUTPUT"
            echo "::warning::nox CLI not available in this runner; security scan skipped. See docs."
          fi

      - name: Scan workspace
        if: steps.install_nox.outputs.installed == '1'
        run: nox scan .

      - name: Fail on new findings introduced by this commit
        if: steps.install_nox.outputs.installed == '1' && github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          nox diff --base "$BASE_SHA" --severity high

      - name: Upload findings
        if: always() && steps.install_nox.outputs.installed == '1'
        uses: actions/upload-artifact@v4
        with:
          name: nox-findings
          path: |
            findings.json
            .nox/

  nox-remediate:
    name: Nox remediation plan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Install nox
        id: install_nox
        run: |
          if command -v brew >/dev/null 2>&1 && \
             brew install felixgeelhaar/tap/nox 2>/dev/null; then
            echo "installed=1" >> "$GITHUB_OUTPUT"
          else
            echo "installed=0" >> "$GITHUB_OUTPUT"
            echo "::warning::nox CLI not available; remediation plan skipped."
          fi

      - name: Scan + write upgrade plan
        if: steps.install_nox.outputs.installed == '1'
        run: |
          nox scan .
          nox fix --plan-only --include-major=false --output remediation-plan.json
          if [ -s remediation-plan.json ]; then
            echo "Remediation plan written:"
            cat remediation-plan.json
          else
            echo "No actionable remediations."
          fi

      - name: Upload remediation plan
        if: always() && steps.install_nox.outputs.installed == '1'
        uses: actions/upload-artifact@v4
        with:
          name: nox-remediation-plan
          path: remediation-plan.json
