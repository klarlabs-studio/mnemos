name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - "internal/relate/**"
      - "internal/extract/**"
      - "internal/pipeline/**"
      - "benchmarks/**"
      - "cmd/mnemos/**"
      - ".github/workflows/benchmarks.yml"
  pull_request:
    branches: [main]
    paths:
      - "internal/relate/**"
      - "internal/extract/**"
      - "internal/pipeline/**"
      - "benchmarks/**"
      - "cmd/mnemos/**"
      - ".github/workflows/benchmarks.yml"

permissions:
  contents: read

jobs:
  contradiction-detection:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build mnemos
        run: make build

      - name: Install harness deps
        run: pip install -r benchmarks/requirements.txt

      # Local-binary mode: the harness runs `mnemos` directly via
      # MNEMOS_BIN, talking to a fresh sqlite per case. No docker, no
      # postgres, no JWT secret juggling — same pattern the Recall Gate
      # uses. MNEMOS_BENCH_LLM=0 forces rule-based extraction; CI has
      # no LLM provider and the suite only needs deterministic claim
      # extraction to exercise the relate stage.
      - name: Run contradiction-detection suite (rule-based)
        env:
          MNEMOS_BIN: bin/mnemos
          MNEMOS_BENCH_LLM: "0"
        run: |
          python -m benchmarks.run \
            --provider mnemos \
            --suite contradiction_detection \
            --output benchmarks/results

      - name: Compare against baseline
        env:
          MNEMOS_BENCH_LLM: "0"
        run: |
          python -m benchmarks.check_baseline \
            --baseline benchmarks/baseline.json \
            --results-dir benchmarks/results \
            --allow-missing real_trace_recall

      - name: Upload latest results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: benchmarks/results/*.json
