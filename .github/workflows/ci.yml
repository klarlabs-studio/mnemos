# Thin caller for the shared klarlabs-studio Go CI bar. All core gate logic
# (format, golangci-lint w/ gocritic, race + coverage tests, coverctl gate,
# nox security scan w/ pinned+sha256 binary) lives in the reusable workflow —
# bump versions / add jobs there, once, org-wide.
#
# mnemos-specific jobs that the shared bar does NOT cover live in their own
# workflows: db-providers.yml (Postgres + MySQL), recall-gate.yml (Python
# benchmark gate), integration.yml (docker-compose smoke), release.yml
# (multi-arch docker / goreleaser / SLSA).
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klarlabs-studio/.github/.github/workflows/go-ci.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write   # shared security job posts nox annotations on PRs
    secrets: inherit
    with:
      # go.mod requires >= 1.26.2; setup-go pins GOTOOLCHAIN=local, so the
      # shared default (1.25) can't auto-download a newer toolchain.
      go-version: "1.26"
      # The org-pinned golangci-lint v2.7.2 release binary is built with
      # go1.25 and refuses to lint a go1.26.2 module ("build Go version is
      # lower than the targeted Go version"). v2.12.2 is built with go1.26.2.
      # TODO(org): bump the shared go-ci.yml golangci default for go1.26 repos.
      golangci-version: "v2.12.2"
      # mnemos enforces coverctl check already; pure-Go core runs fine on ubuntu.
      coverage: true
      cross-platform: false
