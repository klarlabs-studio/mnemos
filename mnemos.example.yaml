# Mnemos configuration file.
#
# Copy to one of the discovered locations and edit:
#   .mnemos/mnemos.yaml        (per project, walked up from CWD)
#   ~/.config/mnemos/config.yaml   (per user, XDG)
# or point at it explicitly with `--config <path>` / MNEMOS_CONFIG=<path>.
#
# Every key is OPTIONAL — omit anything you don't need; omitted keys fall back
# to their built-in defaults. An exported MNEMOS_* environment variable always
# OVERRIDES the value here, so keep secrets in the environment when you prefer.
# Each key maps to exactly one MNEMOS_* variable (noted inline).

db:
  url:                 # MNEMOS_DB_URL — sqlite:// | memory:// | postgres:// | mysql:// | libsql://
  max_conns:           # MNEMOS_DB_MAX_CONNS (Postgres/MySQL, default 25)
  max_idle_conns:      # MNEMOS_DB_MAX_IDLE_CONNS (default 5)
  conn_max_lifetime:   # MNEMOS_DB_CONN_MAX_LIFETIME (Go duration, default 30m)
  shared_pool:         # MNEMOS_PG_SHARED_POOL (true/false) — Postgres multi-tenant: one shared pool with per-request SET tenant (ADR 0007 Phase 2), instead of a pool per tenant

llm:
  provider:            # MNEMOS_LLM_PROVIDER — anthropic | openai | gemini | ollama | openai-compat
  api_key:             # MNEMOS_LLM_API_KEY (required for cloud providers)
  model:               # MNEMOS_LLM_MODEL
  base_url:            # MNEMOS_LLM_BASE_URL (required for openai-compat / remote ollama)
  timeout:             # MNEMOS_LLM_TIMEOUT (Go duration, default 120s)
  cache_max_bytes:     # MNEMOS_LLM_CACHE_MAX_BYTES (default 1 GiB; 0 disables eviction)
  extract_model:       # MNEMOS_EXTRACT_MODEL (override model for the extract stage only)
  # Bounds one extraction request. The default sits above the 20KiB cap on a
  # session capture, so a capture stays a single request as before; batching is
  # a safety valve for unusually large inputs. Lower it only if a whole input
  # would exceed the per-request LLM timeout but a slice would not. Note the
  # ~5KB system prompt is re-sent per request, so smaller batches multiply that
  # fixed cost — on a slow local model no batch size makes a big transcript
  # practical, and rule-based fallback is the expected outcome.
  extract_batch_chars: # MNEMOS_EXTRACT_BATCH_CHARS (int, default 24000)

embed:
  provider:            # MNEMOS_EMBED_PROVIDER (falls back to llm.provider)
  api_key:             # MNEMOS_EMBED_API_KEY (falls back to llm.api_key)
  model:               # MNEMOS_EMBED_MODEL
  base_url:            # MNEMOS_EMBED_BASE_URL
  timeout:             # MNEMOS_EMBED_TIMEOUT (Go duration, default 60s)

serve:
  port:                # MNEMOS_SERVE_PORT (HTTP REST port)
  tls_cert_file:       # MNEMOS_TLS_CERT_FILE
  tls_key_file:        # MNEMOS_TLS_KEY_FILE
  mtls_client_ca_file: # MNEMOS_MTLS_CLIENT_CA_FILE (enables mTLS client-cert verification)
  # Both LOOSEN authentication. Secure by default when unset: every data
  # endpoint requires a JWT, reads included.
  public_reads:        # MNEMOS_PUBLIC_READS (bool, default false — allow anonymous GET/HEAD/OPTIONS)
  metrics_public:      # MNEMOS_METRICS_PUBLIC (bool, default false — unauthenticate /internal/metrics)

# Point a CLIENT (e.g. the recall/brief/capture hooks) at a remote hosted brain.
# Written by `mnemos init --url <endpoint> [--token]`. When server.url is set, the
# hooks call the REST API instead of opening a local store. (Distinct from
# `registry:` above, which is federation, and `serve:`, this process's listener.)
server:
  url:                 # MNEMOS_URL (hosted brain REST endpoint, e.g. https://brain.example.com)
  token:               # MNEMOS_TOKEN (bearer token; kept at 0600 — a credential)

auth:
  jwt_secret:          # MNEMOS_JWT_SECRET (hex, >=32 bytes; prefer the environment for this)
  jwt_prev_secret:     # MNEMOS_JWT_PREV_SECRET (previous secret, for rotation)
  dir:                 # MNEMOS_AUTH_DIR (directory for the JWT signing secret file)
  user_id:             # MNEMOS_USER_ID (default write actor)

registry:
  url:                 # MNEMOS_REGISTRY_URL
  token:               # MNEMOS_REGISTRY_TOKEN

federation:
  enabled:             # MNEMOS_FEDERATION_ENABLED (true/false)

telemetry:
  optin:               # MNEMOS_TELEMETRY_OPTIN (true/false; default off)
  endpoint:            # MNEMOS_TELEMETRY_ENDPOINT (POST destination; unset = no send)

kernel:
  max_duration:        # MNEMOS_AXI_MAX_DURATION (Go duration; single-session bound)
  max_invocations:     # MNEMOS_AXI_MAX_INVOCATIONS (positive int)
  max_tokens:          # MNEMOS_AXI_MAX_TOKENS (positive int)
  evidence_log:        # MNEMOS_AXI_EVIDENCE_LOG (JSONL evidence sink path)

feedback:
  contest_threshold:   # MNEMOS_FEEDBACK_CONTEST_THRESHOLD (int, default 3)
  decay:               # MNEMOS_FEEDBACK_DECAY (float, default 0.9)

job:
  timeout:             # MNEMOS_JOB_TIMEOUT (Go duration, default 10m)

query:
  # Optional retrieval behaviors, all off by default. Each also has a
  # per-invocation flag (`query --prime`, `--salient`, ...); set here to make
  # the choice standing.
  spreading_activation: # MNEMOS_SPREADING_ACTIVATION (bool) prime associated beliefs (ADR 0013 §2)
  salience:             # MNEMOS_SALIENCE (bool) blend a stakes term into ranking (ADR 0013 §4)
  # ⚠ The three below WRITE during a read: enabling them means every query
  # mutates the store. Same exposure as exporting the env var permanently, but
  # visible here. Leave unset to keep reads read-only.
  hebbian:              # MNEMOS_HEBBIAN (bool) strengthen co-retrieved edges (ADR 0015 §4)
  reconsolidate:        # MNEMOS_RECONSOLIDATE (bool) mark recalled beliefs verified-now (ADR 0015 §5)
  inhibit:              # MNEMOS_INHIBIT (bool) suppress a beaten contradiction loser (ADR 0016)

capture:
  # How the session gets recorded into the brain.
  #
  #   auto        (default) incremental for local inference, end for hosted
  #   incremental capture during the session: Stop after each response and
  #               PreCompact before context is summarised away, each ingesting
  #               only what is new. SessionEnd sweeps the remainder. Work is
  #               detached, so the hook returns in ~1s.
  #   end         one capture at SessionEnd (the original behavior)
  #   off         no capture hooks at all
  #
  # Pick by provider — the trade-off is real in both directions:
  #
  #   ollama / llama.cpp / LM Studio (local)   -> incremental
  #     A whole 20KiB transcript in one extraction request is ~23 minutes on
  #     qwen2.5:14b, so it never completes and silently degrades to rule-based.
  #     Per-turn chunks (median ~136 chars) extract in seconds.
  #
  #   claude-haiku / gpt-4o-mini / gemini-flash (hosted) -> end
  #     Fast enough for one request per session. Incremental would instead mean
  #     one API call per turn, each re-sending the ~5KB extraction prompt —
  #     materially more spend for no benefit.
  #
  # Changing this takes effect immediately for hooks that are already
  # installed, but re-run `mnemos init` to add or remove the per-turn hooks.
  strategy:            # MNEMOS_CAPTURE_STRATEGY (auto|incremental|end|off, default auto)

  # Bounds the whole SessionEnd capture (ingest→extract→relate) for one
  # session. A ceiling, not a reservation: a fast provider returns as soon as
  # it is done. The 4m default is sized for a slow local model — cloud or
  # hosted brains can safely set this much lower (e.g. 60s).
  #
  # `mnemos init` writes a matching Claude Code hook timeout. Raising this
  # above that hook timeout means Claude Code kills capture first, so re-run
  # `mnemos init` after raising it.
  timeout:             # MNEMOS_CAPTURE_TIMEOUT (Go duration, default 4m)

floatback:
  # When true, a session-end capture inside a repo/workspace also floats
  # important learnings up into the personal central brain (best-effort, the
  # same selection as `mnemos float-back --apply`). Off by default; the default
  # capture path is unchanged when unset/false.
  on_capture:          # MNEMOS_FLOATBACK_ON_CAPTURE (true/false; default off)

plasticity:
  # Neuromodulation sensitivity for `consolidate --plastic` (ADR 0015 §2): how
  # strongly recent surprise-volatility scales the global credit learning-rate.
  # Default 1.0 (active under --plastic); 0 disables neuromodulation only, leaving
  # per-belief metaplasticity (crystallization) on. Only consulted with --plastic.
  sensitivity:         # MNEMOS_PLASTICITY_SENSITIVITY (float >= 0, default 1.0)

metrics:
  # How often `mnemos serve` samples product + cognitive metrics for Prometheus
  # (ADR 0020): counts, trust, free-energy, calibration, dissonance, brain-health
  # status, and integrity pathologies — scrapeable at /internal/metrics for Grafana.
  # Each tick runs one full-scan BrainHealth; raise it for a large brain. 0 disables.
  sample_interval:     # MNEMOS_METRICS_SAMPLE_INTERVAL (Go duration, default 60s)

log:
  # Level of the structured operational logs (ADR 0021): consolidation passes, brain-
  # health degradation, promotion, the axi write-audit. One of trace|debug|info|warn|
  # error (default info). Set to warn to keep only degradation/anomaly logs.
  level:               # MNEMOS_LOG_LEVEL (default info)

# Read-time precedence when a federated read (global brain + tenant/repo brain)
# surfaces the same topic from both tiers (ADR 0011 Phase C). One of:
#   tenant-wins         the tenant/repo tier wins on conflict (default; local dev)
#   global-wins         the vetted global (neocortex) tier wins (curated products)
#   surface-dissonance  keep both and flag the disagreement for the agent
precedence:            # MNEMOS_PRECEDENCE (default tenant-wins)
